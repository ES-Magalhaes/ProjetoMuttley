<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos/head :: head('Formulário de Evento')}"></head>
<body>
	<header th:replace="~{fragmentos/header :: header(activePage='eventos')}"></header>

	<div class="container" style="max-width: 620px;">
		<div class="card">
			<div class="card-header">
				<h3 class="card-title mb-0">Dados do Evento</h3>
			</div>
			<div class="card-body">
				<form th:action="@{/evento/salvar}" th:object="${evento}" method="post">
					<input type="hidden" th:field="*{id}" />

					<div class="form-group">
						<label class="form-label">Tema do Evento</label>
						<input type="text" th:field="*{tema}" class="form-control"
						       th:classappend="${#fields.hasErrors('tema')} ? 'is-invalid'"
						       placeholder="Digite o tema do evento" />
					</div>

					<div class="form-group">
						<label class="form-label">Organizador Responsável</label>
						<select th:field="*{organizadorId}" class="form-control"
						        th:classappend="${#fields.hasErrors('organizadorId')} ? 'is-invalid'">
							<option value="">Selecione um organizador...</option>
							<option th:each="org : ${organizadores}" th:value="${org.id}" th:text="${org.nome}"></option>
						</select>
					</div>

					<div class="form-group">
						<label class="form-label">Pontuação Atribuída</label>
						<input type="number" th:field="*{pontos}" class="form-control" />
					</div>

					<div class="form-group">
						<label class="form-label">Descrição</label>
						<textarea th:field="*{descricao}" class="form-control" rows="3"
						          placeholder="Descreva o evento..."></textarea>
					</div>

					<div style="display:flex; gap:0.75rem; justify-content:flex-end; margin-top:1.5rem;">
						<a th:href="@{/evento}" class="btn btn-secondary">
							<i class="fa-solid fa-arrow-left"></i> Cancelar
						</a>
						<button type="submit" class="btn btn-success">
							<i class="fa-solid fa-floppy-disk"></i> Salvar Evento
						</button>
					</div>
				</form>
			</div>
		</div>
	</div>

	<div th:replace="~{fragmentos/footer :: footer}"></div>
</body>
</html>
