<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos/head :: head('Formulário de Evento')}"></head>
<body>
	<header
		th:replace="~{fragmentos/header :: header(activePage='Evento')}"></header>
	<div class="container" style="max-width: 600px;">
		<div class="card shadow-sm">
			<div class="card-header bg-dark text-white">
				<h3 class="card-title mb-0">Dados do Evento</h3>
			</div>
			<div class="card-body">
				<form th:action="@{/evento/salvar}" th:object="${evento}"
					method="post">
					<input type="hidden" th:field="*{id}" />

					<div class="mb-3">
						<label class="form-label">Tema do Evento</label> <input
							type="text" th:field="*{tema}" class="form-control"
							th:classappend="${#fields.hasErrors('tema')} ? 'is-invalid'" />
					</div>

					<div class="mb-3">
						<label class="form-label">Organizador Responsável</label> <select
							th:field="*{organizadorId}" class="form-control"
							th:classappend="${#fields.hasErrors('organizadorId')} ? 'is-invalid'">
							<option value="">Selecione...</option>
							<option th:each="org : ${organizadores}" th:value="${org.id}"
								th:text="${org.nome}"></option>
						</select>
					</div>

					<div class="mb-3">
						<label class="form-label">Pontuação Atribuída</label> <input
							type="number" th:field="*{pontos}" class="form-control" />
					</div>

					<div class="mb-3">
						<label class="form-label">Descrição</label>
						<textarea th:field="*{descricao}" class="form-control" rows="2"></textarea>
					</div>

					<div class="text-right">
						<a th:href="@{/evento}" class="btn btn-secondary">Cancelar</a>
						<button type="submit" class="btn btn-success">Salvar
							Evento</button>
					</div>
				</form>
			</div>
		</div>
	</div>
</body>
</html>
