<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos/head :: head('Listagem de Eventos')}"></head>
<body>
	<header
		th:replace="~{fragmentos/header :: header(activePage='Evento')}"></header>

	<div class="container mt-4">
		<div class="d-flex justify-content-between align-items-center mb-4">
			<h2>Eventos Cadastrados</h2>
			<a th:href="@{/evento/formulario}" class="btn btn-primary"> <i
				class="fa-solid fa-plus"></i> Novo Evento
			</a>
		</div>

		<div class="card shadow-sm">
			<div class="table-responsive">
				<table class="table table-hover mb-0">
					<thead class="thead-light">
						<tr>
							<th>Tema</th>
							<th>Descrição</th>
							<th>Local</th>
							<th>Data</th>
							<th>Organizador</th>
							<th class="text-center">Ações</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="e : ${eventos}">
							<td th:text="${e.tema}" class="font-weight-bold"></td>
							<td th:text="${e.descricao}"></td>
							<td th:text="${e.local}"></td>
							<td th:text="${#temporals.format(e.data, 'dd/MM/yyyy')}"></td>
							<td
								th:text="${e.organizador != null ? e.organizador.nome : 'Sem Organizador'}"></td>
							<td class="text-end"><a
								th:href="@{'/evento/formulario/' + ${e.id}}"
								class="text-primary mr-3" title="Editar"> <i
									class="fa-regular fa-pen-to-square"></i>
							</a> <a th:href="@{'/evento/delete/' + ${e.id}}" class="text-danger"
								title="Excluir"
								onclick="return confirm('Deseja excluir este evento?')"> <i
									class="fa-regular fa-trash-can"></i>
							</a></td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>

		<div th:if="${eventos.empty}"
			class="alert alert-info mt-3 text-center">Nenhum evento
			cadastrado.</div>
	</div>

	<div th:replace="~{fragmentos/footer :: footer}"></div>
</body>
</html>
