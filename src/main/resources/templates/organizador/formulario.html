<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head
	th:replace="~{fragmentos/head :: head('Formulário de Organizador')}"></head>
<body>
	<header
		th:replace="~{fragmentos/header :: header(activePage='Organizador')}"></header>

	<div class="container" style="max-width: 600px;">
		<div class="card shadow-sm">
			<div class="card-header bg-dark text-white">
				<h3 class="card-title mb-0"
					th:text="${organizador.id != null} ? 'Editar Organizador' : 'Novo Organizador'"></h3>
			</div>
			<div class="card-body">
				<form th:action="@{/organizador/salvar}" th:object="${organizador}"
					method="post">

					<input type="hidden" th:field="*{id}" />

					<div class="mb-3">
						<label class="form-label">Nome</label> <input type="text"
							th:field="*{nome}" class="form-control"
							th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid'" />
						<div class="invalid-feedback" th:errors="*{nome}"></div>
					</div>

					<div class="mb-3">
						<label class="form-label">Disciplinas</label> <input type="text"
							th:field="*{disciplinas}" class="form-control"
							th:classappend="${#fields.hasErrors('disciplinas')} ? 'is-invalid'" />
						<div class="invalid-feedback" th:errors="*{disciplinas}"></div>
					</div>

					<div class="mb-3">
						<label class="form-label">Qualificações</label>
						<textarea th:field="*{qualificacoes}" class="form-control"
							rows="3"></textarea>
					</div>

					<div class="text-right">
						<a th:href="@{/organizador}" class="btn btn-secondary mr-2">Cancelar</a>
						<button type="submit" class="btn btn-success">Salvar</button>
					</div>
				</form>
			</div>
		</div>
	</div>
	<div th:replace="~{fragmentos/footer :: footer}"></div>
</body>
</html>
