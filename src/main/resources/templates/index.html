<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragmentos/head :: head('Início - Projeto Muttley')}"></head>

<body>
	<header th:replace="~{fragmentos/header :: header(activePage='inicio')}"></header>

	<main>
		<section class="welcome-section">
			<div class="welcome-image-container">
				<img th:src="@{/images/boas_vindas_projeto_muttley.png}" src="/images/boas_vindas_projeto_muttley.png"
					alt="Bem-vindo ao Projeto Muttley" class="welcome-image">
			</div>
			<div class="welcome-text">
				<h1>Bem-vindo ao Projeto Muttley!</h1>
				<p>O seu sistema definitivo de gerenciamento acadêmico. Aqui você pode organizar eventos de forma
					inteligente, gerenciar alunos, cadastrar organizadores e emitir certificados diretamente na
					plataforma. Navegue pelo menu acima para começar!</p>
			</div>
		</section>

		<section class="carrosel">
			<div class="carousel-container">
				<div class="carousel-track" id="carouselTrack">
					<div class="carousel-slide">
						<img src="/images/palestra01.webp" alt="Palestra 01">
					</div>
					<div class="carousel-slide">
						<img src="/images/palestra02.webp" alt="Palestra 02">
					</div>
					<div class="carousel-slide">
						<img src="/images/palestra03.jpg" alt="Palestra 03">
					</div>
				</div>

				<button class="carousel-btn prev" id="btnPrev">
					<i class="fa-solid fa-chevron-left"></i>
				</button>
				<button class="carousel-btn next" id="btnNext">
					<i class="fa-solid fa-chevron-right"></i>
				</button>

				<div class="carousel-dots" id="carouselDots">
					<span class="dot active"></span>
					<span class="dot"></span>
					<span class="dot"></span>
				</div>
			</div>
		</section>

		<style>
			.carrosel {
				width: 100%;
				margin: 2rem 0;
			}

			.carousel-container {
				position: relative;
				width: 100%;
				max-width: 900px;
				margin: 0 auto;
				overflow: hidden;
				border-radius: 16px;
				box-shadow: 0 8px 32px rgba(25, 38, 181, 0.16);
				background: #000;
			}

			.carousel-track {
				display: flex;
				transition: transform 0.5s ease-in-out;
			}

			.carousel-slide {
				min-width: 100%;
				height: 420px;
			}

			.carousel-slide img {
				width: 100%;
				height: 100%;
				object-fit: cover;
				display: block;
			}

			.carousel-btn {
				position: absolute;
				top: 50%;
				transform: translateY(-50%);
				background: rgba(25, 38, 181, 0.7);
				color: #fff;
				border: none;
				width: 44px;
				height: 44px;
				border-radius: 50%;
				cursor: pointer;
				font-size: 1rem;
				display: flex;
				align-items: center;
				justify-content: center;
				transition: background 0.2s;
				z-index: 10;
			}

			.carousel-btn:hover {
				background: rgba(18, 28, 138, 0.9);
			}

			.carousel-btn.prev {
				left: 14px;
			}

			.carousel-btn.next {
				right: 14px;
			}

			.carousel-dots {
				position: absolute;
				bottom: 12px;
				left: 50%;
				transform: translateX(-50%);
				display: flex;
				gap: 8px;
			}

			.dot {
				width: 10px;
				height: 10px;
				border-radius: 50%;
				background: rgba(255, 255, 255, 0.5);
				cursor: pointer;
				transition: background 0.2s;
			}

			.dot.active {
				background: #fff;
			}
		</style>

		<script>
			(function () {
				const track = document.getElementById('carouselTrack');
				const dots = document.querySelectorAll('.dot');
				const total = document.querySelectorAll('.carousel-slide').length;
				let current = 0;
				let timer;

				function goTo(index) {
					current = (index + total) % total;
					track.style.transform = `translateX(-${current * 100}%)`;
					dots.forEach((d, i) => d.classList.toggle('active', i === current));
				}

				function next() { goTo(current + 1); }
				function prev() { goTo(current - 1); }

				function startAuto() {
					timer = setInterval(next, 4000);
				}

				function resetAuto() {
					clearInterval(timer);
					startAuto();
				}

				document.getElementById('btnNext').addEventListener('click', () => { next(); resetAuto(); });
				document.getElementById('btnPrev').addEventListener('click', () => { prev(); resetAuto(); });
				dots.forEach((d, i) => d.addEventListener('click', () => { goTo(i); resetAuto(); }));

				startAuto();
			})();
		</script>
	</main>

	<div th:replace="~{fragmentos/footer :: footer}"></div>

	<script>
		document.addEventListener('DOMContentLoaded', () => {
			const inner = document.querySelector('.carousel-inner');
			const items = document.querySelectorAll('.carousel-item');
			let currentIndex = 0;
			let intervalId;

			function showSlide(index) {
				if (index >= items.length) currentIndex = 0;
				else if (index < 0) currentIndex = items.length - 1;
				else currentIndex = index;
				inner.style.transform = `translateX(-${currentIndex * 100}%)`;
			}

			function nextSlide() { showSlide(currentIndex + 1); }
			function prevSlide() { showSlide(currentIndex - 1); }

			document.getElementById('btnNext').addEventListener('click', () => { nextSlide(); resetAutoPlay(); });
			document.getElementById('btnPrev').addEventListener('click', () => { prevSlide(); resetAutoPlay(); });

			function resetAutoPlay() {
				clearInterval(intervalId);
				intervalId = setInterval(nextSlide, 4000); // Troca a imagem a cada 4 segundos
			}

			resetAutoPlay(); // Inicia o motor automático
		});
	</script>
</body>

</html>
