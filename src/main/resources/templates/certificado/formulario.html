<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos/head :: head('Emitir Certificado')}"></head>
<body>
	<header
		th:replace="~{fragmentos/header :: header(activePage='Certificado')}"></header>

	<div class="container" style="max-width: 620px;">
		<div class="card shadow-sm">
			<div class="card-header bg-primary text-white">
				<h3 class="card-title mb-0">Emitir Certificado</h3>
			</div>
			<div class="card-body">

				<form th:action="@{/certificado/salvar}" th:object="${certificado}"
					method="post">

					<div th:if="${#fields.hasAnyErrors()}" class="alert alert-danger">
						<ul class="mb-0">
							<li th:each="err : ${#fields.allErrors()}" th:text="${err}"></li>
						</ul>
					</div>

					<input type="hidden" th:field="*{id}" />

					<div class="form-group mb-3">
						<label class="form-label">Nome do Certificado</label> <input
							type="text" th:field="*{nome}" class="form-control"
							placeholder="Ex: Certificado de Participação"
							th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid'" />
					</div>

					<div class="form-group mb-3">
						<label class="form-label">Aluno</label> <select
							th:field="*{alunoRa}" class="form-control"
							th:classappend="${#fields.hasErrors('alunoRa')} ? 'is-invalid'">
							<option value="">Selecione um aluno...</option>
							<option th:each="a : ${alunos}" th:value="${a.ra}"
								th:text="${a.nome}"></option>
						</select>
					</div>

					<div class="form-group mb-3">
						<label class="form-label">Evento</label> <select
							th:field="*{eventoId}" class="form-control"
							th:classappend="${#fields.hasErrors('eventoId')} ? 'is-invalid'">
							<option value="">Selecione um evento...</option>
							<option th:each="e : ${eventos}" th:value="${e.id}"
								th:text="${e.tema}"></option>
						</select>
					</div>

					<div class="row">
						<div class="col-md-6">
							<div class="form-group mb-3">
								<label class="form-label">Medalha</label> <select
									th:field="*{medalha}" class="form-control">
									<option value="Ouro">Ouro</option>
									<option value="Prata">Prata</option>
									<option value="Bronze">Bronze</option>
									<option value="Participação">Participação</option>
								</select>
							</div>
						</div>
						<div class="col-md-6">
							<div class="form-group mb-3">
								<label class="form-label">Pontuação</label> <input type="number"
									th:field="*{pontuacao}" class="form-control" />
							</div>
						</div>
					</div>

					<div
						style="display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.5rem;">
						<a th:href="@{/certificado}" class="btn btn-secondary"> <i
							class="fa-solid fa-arrow-left"></i> Cancelar
						</a>
						<button type="submit" class="btn btn-success">
							<i class="fa-solid fa-floppy-disk"></i> Emitir Certificado
						</button>
					</div>
				</form>
			</div>
		</div>
	</div>

	<div th:replace="~{fragmentos/footer :: footer}"></div>
</body>
</html>
