<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos/head :: head('Emitir Certificado')}"></head>
<body>
	<header th:replace="~{fragmentos/header :: header(activePage='certificados')}"></header>

	<div class="container" style="max-width: 620px;">
		<div class="card">
			<div class="card-header">
				<h3 class="card-title mb-0">Emitir Certificado</h3>
			</div>
			<div class="card-body">
				<form th:action="@{/certificado/salvar}" th:object="${certificado}" method="post">
					<input type="hidden" th:field="*{id}" />

					<div class="form-group">
						<label class="form-label">Aluno</label>
						<select th:field="*{alunoId}" class="form-control">
							<option value="">Selecione um aluno...</option>
							<option th:each="a : ${alunos}" th:value="${a.ra}" th:text="${a.nome}"></option>
						</select>
					</div>

					<div class="form-group">
						<label class="form-label">Evento</label>
						<select th:field="*{eventoId}" class="form-control">
							<option value="">Selecione um evento...</option>
							<option th:each="e : ${eventos}" th:value="${e.id}" th:text="${e.tema}"></option>
						</select>
					</div>

					<div class="form-group">
						<label class="form-label">Medalha</label>
						<input type="text" th:field="*{medalha}" class="form-control" placeholder="Ex: Ouro, Prata, Bronze" />
					</div>

					<div class="form-group">
						<label class="form-label">Pontuação</label>
						<input type="number" th:field="*{pontuacao}" class="form-control" />
					</div>

					<div style="display:flex; gap:0.75rem; justify-content:flex-end; margin-top:1.5rem;">
						<a th:href="@{/certificado}" class="btn btn-secondary">
							<i class="fa-solid fa-arrow-left"></i> Cancelar
						</a>
						<button type="submit" class="btn btn-success">
							<i class="fa-solid fa-floppy-disk"></i> Emitir
						</button>
					</div>
				</form>
			</div>
		</div>
	</div>

	<div th:replace="~{fragmentos/footer :: footer}"></div>
</body>
</html>
