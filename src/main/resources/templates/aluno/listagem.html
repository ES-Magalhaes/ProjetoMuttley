<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos/head :: head('Listagem de Alunos')}"></head>
<body>
	<header th:replace="~{fragmentos/header :: header(activePage='Aluno')}"></header>

	<div class="container" style="max-width: 900px;">
		<h2 class="text-center mb-4">Lista de Alunos</h2>

		<div th:if="${message != null}"
			class="alert alert-success alert-dismissible fade show text-center"
			role="alert">
			[[${message}]]
			<button type="button" class="close" data-dismiss="alert"
				aria-label="Close">
				<span aria-hidden="true">&times;</span>
			</button>
		</div>

		<div th:if="${error != null}"
			class="alert alert-danger alert-dismissible fade show text-center"
			role="alert">
			[[${error}]]
			<button type="button" class="close" data-dismiss="alert"
				aria-label="Close">
				<span aria-hidden="true">&times;</span>
			</button>
		</div>

		<div class="mb-3 text-right">
			<a th:href="@{/aluno/formulario}" class="btn btn-primary">Novo
				Aluno</a>
		</div>

		<div th:if="${listaAlunos.size() > 0}">
			<table class="table table-hover">
				<thead class="thead-light">
					<tr>
						<th>Nome</th>
						<th>Email</th>
						<th>Pontos</th>
						<th class="text-center">Ações</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="aluno : ${listaAlunos}">
						<td th:text="${aluno.nome}"></td>
						<td th:text="${aluno.email}"></td>
						<td th:text="${aluno.pontos}"></td>
						<td class="text-center"><a
							th:href="@{'/aluno/formulario/' + ${aluno.ra}}"
							title="Editar Aluno" class="text-primary mr-3"> <i
								class="fa-regular fa-pen-to-square"></i>
						</a> <a th:href="@{'/aluno/delete/' + ${aluno.ra}}"
							title="Excluir Aluno" class="text-danger"
							onclick="return confirm('Tem certeza que deseja excluir este aluno?')">
								<i class="fa-regular fa-trash-can"></i>
						</a></td>
					</tr>
				</tbody>
			</table>
		</div>

		<div th:unless="${listaAlunos.size() > 0}"
			class="alert alert-info text-center">Nenhum aluno cadastrado.</div>
	</div>

	<div th:replace="~{fragmentos/footer :: footer}"></div>
</body>
</html>
